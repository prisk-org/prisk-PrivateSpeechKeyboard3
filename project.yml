name: Prisk
options:
  bundleIdPrefix: io.prisk
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupOrdering:
    - order: [PriskApp, PriskKeyboard, PriskSTT, PriskShared, Tests, Resources]

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "U2BRSZ28PG"
    CODE_SIGN_STYLE: Automatic
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES

targets:

  # ──────────────────────────────────────────────────
  # PriskApp — Main application (STT host)
  # ──────────────────────────────────────────────────
  PriskApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: PriskApp/Info.plist
      properties:
        CFBundleDisplayName: Prisk
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Prisk needs microphone access to transcribe your speech locally on device."
        NSSpeechRecognitionUsageDescription: "Prisk uses on-device speech recognition to transcribe your voice privately."
        CFBundleURLTypes:
          - CFBundleURLName: io.prisk.keyboard
            CFBundleURLSchemes:
              - prisk
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
    entitlements:
      path: PriskApp/PriskApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.prisk.keyboard
    sources:
      - path: PriskApp
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: PriskSTT
      - path: PriskShared
      - path: Resources
    dependencies:
      - package: WhisperKit
    settings:
      base:
        PRODUCT_NAME: Prisk
        PRODUCT_BUNDLE_IDENTIFIER: io.prisk.keyboard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # ──────────────────────────────────────────────────
  # PriskKeyboard — Keyboard Extension
  # ──────────────────────────────────────────────────
  PriskKeyboard:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: PriskKeyboard/Info.plist
      properties:
        CFBundleDisplayName: Prisk Keyboard
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    entitlements:
      path: PriskKeyboard/PriskKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.prisk.keyboard
    sources:
      - path: PriskKeyboard
        excludes:
          - "*.entitlements"
          - "*.plist"
      - path: PriskShared
    settings:
      base:
        PRODUCT_NAME: PriskKeyboard
        PRODUCT_BUNDLE_IDENTIFIER: io.prisk.keyboard.extension
        APPLICATION_EXTENSION_API_ONLY: YES

  # ──────────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────────
  STTEngineTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests/STTEngineTests
    dependencies:
      - target: PriskApp
    settings:
      base:
        TEST_HOST: ""
        BUNDLE_LOADER: ""

  PriskUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Tests/PriskUITests
    dependencies:
      - target: PriskApp

schemes:
  Prisk:
    build:
      targets:
        PriskApp: all
        PriskKeyboard: all
    run:
      config: Debug
      executable: PriskApp
    test:
      config: Debug
      targets:
        - STTEngineTests
        - PriskUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
